name: Database Backup

on:
  # Run every 7 days at 3:00 AM UTC
  schedule:
    - cron: "0 3 */7 * *"

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      schema_only:
        description: "Backup schema only (no data)"
        required: false
        default: "false"
        type: boolean

env:
  BACKUP_RETAIN: 4 # Keep last 4 backups (28 days)

jobs:
  backup:
    name: Create Database Backup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Set up Node.js (for R2 upload)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Create backup directory
        run: mkdir -p backups

      - name: Create database backup
        env:
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: |
          TIMESTAMP=$(date +"%Y-%m-%d-%H%M%S")
          BACKUP_FILE="backups/backup-${TIMESTAMP}.sql.gz"

          echo "Creating backup: ${BACKUP_FILE}"

          # Build pg_dump options
          PG_DUMP_OPTS="--no-owner --no-acl --clean --if-exists"

          if [[ "${{ github.event.inputs.schema_only }}" == "true" ]]; then
            PG_DUMP_OPTS="${PG_DUMP_OPTS} --schema-only"
            BACKUP_FILE="backups/backup-schema-${TIMESTAMP}.sql.gz"
          fi

          # Execute backup
          pg_dump "${DIRECT_URL}" ${PG_DUMP_OPTS} | gzip > "${BACKUP_FILE}"

          # Verify backup
          if gzip -t "${BACKUP_FILE}"; then
            echo "✅ Backup file verified"
          else
            echo "❌ Backup file verification failed!"
            exit 1
          fi

          # Get file info
          FILE_SIZE=$(du -h "${BACKUP_FILE}" | cut -f1)
          echo "Backup size: ${FILE_SIZE}"

          # Export for later steps
          echo "BACKUP_FILE=${BACKUP_FILE}" >> $GITHUB_ENV
          echo "BACKUP_TIMESTAMP=${TIMESTAMP}" >> $GITHUB_ENV

      - name: Upload backup to R2
        env:
          CLOUDFARE_ACCESS_KEY: ${{ secrets.CLOUDFARE_ACCESS_KEY }}
          CLOUDFARE_SECRET_KEY: ${{ secrets.CLOUDFARE_SECRET_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BACKUP_BUCKET: ${{ secrets.R2_BACKUP_BUCKET }}
        run: |
          node scripts/upload-backup-to-r2.js "${{ env.BACKUP_FILE }}"

      - name: Upload backup artifact (as fallback)
        uses: actions/upload-artifact@v4
        with:
          name: database-backup-${{ env.BACKUP_TIMESTAMP }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 30

      - name: Cleanup old R2 backups
        env:
          CLOUDFARE_ACCESS_KEY: ${{ secrets.CLOUDFARE_ACCESS_KEY }}
          CLOUDFARE_SECRET_KEY: ${{ secrets.CLOUDFARE_SECRET_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BACKUP_BUCKET: ${{ secrets.R2_BACKUP_BUCKET }}
        run: |
          node scripts/cleanup-old-backups.js ${{ env.BACKUP_RETAIN }}

      - name: Backup completed
        run: |
          echo "✅ Database backup completed successfully!"
          echo "📁 File: ${{ env.BACKUP_FILE }}"
          echo "☁️ Uploaded to R2 bucket: ${{ secrets.R2_BACKUP_BUCKET }}"
